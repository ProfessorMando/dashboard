<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Design Tokens */
:root {
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', monospace;

  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.8125rem);
  --text-sm:   clamp(0.8125rem, 0.78rem + 0.2vw, 0.875rem);
  --text-base: clamp(0.875rem, 0.85rem + 0.15vw, 0.9375rem);
  --text-lg:   clamp(1rem, 0.95rem + 0.3vw, 1.125rem);
  --text-xl:   clamp(1.25rem, 1.1rem + 0.6vw, 1.5rem);

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;

  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);

  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface-2: #f9fafb;
  --surface-3: #f0f1f4;
  --border: #dfe1e6;
  --border-subtle: #ecedf0;
  --text: #1a1d26;
  --text-muted: #656a7b;
  --text-faint: #a0a4b2;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --green: #16a34a;
  --green-bg: rgba(22, 163, 74, 0.06);
  --green-border: rgba(22, 163, 74, 0.12);
  --red: #dc2626;
  --red-bg: rgba(220, 38, 38, 0.06);
  --red-border: rgba(220, 38, 38, 0.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}

/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}

body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text);
  background: var(--bg);
  line-height: 1.5;
}

button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }

/* Layout */
.dashboard {
  max-width: 1320px;
  margin: 0 auto;
  padding: var(--space-6) var(--space-4);
}

@media (min-width: 768px) {
  .dashboard { padding: var(--space-8) var(--space-6); }
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-8);
  flex-wrap: wrap;
}

.header-left {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.header-logo {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border-radius: var(--radius-md);
  flex-shrink: 0;
}

.header-logo svg { width: 20px; height: 20px; color: #fff; }

.header h1 {
  font-size: var(--text-xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  transition: all var(--transition);
}
.btn-icon:hover { color: var(--text); border-color: var(--text-faint); }

.btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
  flex-wrap: wrap;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  border-radius: 9999px;
  font-size: var(--text-xs);
  font-weight: 500;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.status-dot.loading {
  animation: pulse-dot 1.2s ease-in-out infinite;
  background: var(--accent);
}

.status-dot.error { background: var(--red); }

@keyframes pulse-dot {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
  margin-top: var(--space-8);
}

.section-header:first-of-type { margin-top: 0; }

.section-header h2 {
  font-size: var(--text-lg);
  font-weight: 600;
  letter-spacing: -0.01em;
}

.section-header .count {
  font-size: var(--text-xs);
  color: var(--text-faint);
  font-weight: 500;
}

/* Market Indicators Grid */
.indicators-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-3);
  margin-bottom: var(--space-8);
}

@media (min-width: 640px) {
  .indicators-grid { grid-template-columns: repeat(2, 1fr); }
}

.indicator-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  transition: border-color var(--transition);
}

.indicator-card:hover { border-color: var(--border); }

.indicator-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-3);
}

.indicator-name {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}

.indicator-symbol {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--text-faint);
  background: var(--surface-3);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
}

.indicator-value {
  font-size: var(--text-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: -0.02em;
}

.indicator-change {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-sm);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.indicator-desc {
  font-size: var(--text-xs);
  color: var(--text-faint);
  line-height: 1.5;
  margin-top: var(--space-1);
}

/* Stock Cards Grid */
.stocks-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-3);
}

@media (min-width: 640px) {
  .stocks-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1024px) {
  .stocks-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 1200px) {
  .stocks-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Stock Card */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  transition: border-color var(--transition);
}

.stock-card:hover { border-color: var(--border); }

/* Card header */
.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-3);
}

.card-identity {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  min-width: 0;
}

.card-logo {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: var(--surface-3);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid var(--border-subtle);
}

.card-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.card-logo-fallback {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-muted);
}

.card-title {
  min-width: 0;
}

.card-symbol {
  font-size: var(--text-sm);
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text);
  letter-spacing: 0.02em;
}

.card-name {
  font-size: var(--text-xs);
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.card-industry {
  font-size: var(--text-xs);
  color: var(--text-faint);
  background: var(--surface-3);
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  align-self: flex-start;
}

/* Price section */
.card-price {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  flex-wrap: wrap;
}

.price-current {
  font-size: var(--text-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: -0.02em;
}

.price-change {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-sm);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
}

.positive { color: var(--green); }
.negative { color: var(--red); }
.price-change.positive { background: var(--green-bg); border: 1px solid var(--green-border); }
.price-change.negative { background: var(--red-bg); border: 1px solid var(--red-border); }

.price-change svg {
  width: 12px;
  height: 12px;
}

/* Metrics grid */
.card-metrics {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-1) var(--space-4);
}

.metric {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-1) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.metric:nth-last-child(-n+2) {
  border-bottom: none;
}

.metric-label {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

.metric-value {
  font-size: var(--text-xs);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  text-align: right;
}

/* News section in card */
.card-news {
  border-top: 1px solid var(--border-subtle);
  padding-top: var(--space-3);
}

.card-news-title {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--space-2);
}

.news-item {
  display: block;
  padding: var(--space-1) 0;
  text-decoration: none;
  color: var(--text);
  transition: color var(--transition);
}

.news-item:hover { color: var(--accent); }

.news-headline {
  font-size: var(--text-xs);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-meta {
  font-size: 0.6875rem;
  color: var(--text-faint);
  margin-top: 2px;
}

/* Skeleton loaders */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-sm);
}

.skeleton-text { height: 1em; margin-bottom: var(--space-1); }
.skeleton-heading { height: 1.75em; width: 50%; }
.skeleton-price { height: 2em; width: 40%; }
.skeleton-metric { height: 0.9em; width: 100%; }

/* Error banner */
.error-banner {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--red);
}

.error-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Spinning refresh icon */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.spinning svg { animation: spin 0.8s linear infinite; }

/* Footer */
.footer {
  margin-top: var(--space-12);
  padding: var(--space-4) 0;
  border-top: 1px solid var(--border-subtle);
  text-align: center;
  font-size: var(--text-xs);
  color: var(--text-faint);
}

.footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color var(--transition);
}
.footer a:hover { color: var(--accent); }

/* Focus */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* Responsive */
@media (max-width: 480px) {
  .header { gap: var(--space-3); }
  .header h1 { font-size: var(--text-lg); }
  .card-metrics { grid-template-columns: 1fr; }
  .metric:last-child { border-bottom: none; }
  .metric:nth-last-child(2) { border-bottom: 1px solid var(--border-subtle); }
}

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ========================================
     Tabs
     ======================================== */
  .tabs {
    display: flex;
    gap: var(--space-1);
    margin-bottom: var(--space-6);
    padding: var(--space-1);
    background: var(--surface-2);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    width: fit-content;
  }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-muted);
    transition: all var(--transition);
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .tab svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* ========================================
     Tab Content
     ======================================== */
  .tab-content { display: block; }
  .tab-content[hidden] { display: none; }

  /* ========================================
     Graph Section
     ======================================== */
  .graph-panel {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-6);
  }

  .graph-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    margin-bottom: var(--space-3);
    flex-wrap: wrap;
  }

  .graph-panel-header h3 {
    font-size: var(--text-lg);
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .graph-panel canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: var(--radius-sm);
  }

  /* ========================================
     Time Range Buttons
     ======================================== */
  .time-range-btns {
    display: flex;
    gap: 2px;
    background: var(--surface-3);
    border-radius: var(--radius-md);
    padding: 2px;
  }

  .time-range-btn {
    padding: 3px var(--space-2);
    border-radius: var(--radius-sm);
    font-size: 0.6875rem;
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--text-muted);
    transition: all var(--transition);
    line-height: 1.4;
  }

  .time-range-btn:hover { color: var(--text); }

  .time-range-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .tr-bottom {
    display: flex;
    justify-content: flex-end;
    margin-top: var(--space-2);
  }

  /* ========================================
     Legend
     ======================================== */
  .graph-legend {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    margin-top: var(--space-3);
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px var(--space-2);
    border-radius: 9999px;
    font-size: 0.6875rem;
    font-weight: 500;
    font-family: var(--font-mono);
    color: var(--text-muted);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all var(--transition);
    user-select: none;
  }

  .legend-item:hover {
    border-color: var(--border);
    color: var(--text);
  }

  .legend-item.hidden {
    opacity: 0.4;
    text-decoration: line-through;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ========================================
     Graph Loading
     ======================================== */
  .graph-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 350px;
    color: var(--text-muted);
    font-size: var(--text-sm);
  }

  .graph-error {
    color: var(--red);
    font-size: var(--text-sm);
    padding: var(--space-4);
    text-align: center;
  }
</style>
</head>
<body>

<div class="dashboard">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <h1>Portfolio Dashboard</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="refreshBtn" onclick="refreshAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs" id="tabBar">
    <button class="tab active" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="tab" data-tab="graphs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Graphs
    </button>
  </nav>

  <div id="dashboardContent" class="tab-content">
  <!-- Status -->
  <div class="status-bar">
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Initializing...</span>
    </div>
    <div class="status-pill" id="timestampPill" style="display:none;">
      <span id="lastUpdated"></span>
    </div>
  </div>

  <!-- Error banner (hidden by default) -->
  <div class="error-banner" id="errorBanner" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText"></span>
  </div>

  <!-- Market Indicators -->
  <div class="section-header">
    <h2>Market Indicators</h2>
    <span class="count">5 indices</span>
  </div>
  <div class="indicators-grid" id="indicatorsGrid">
    <!-- Populated by JS -->
  </div>

  <!-- Stock Holdings -->
  <div class="section-header">
    <h2>Stock Holdings</h2>

async function apiFetch(endpoint, params = {}) {
  const url = new URL(API_BASE + endpoint, window.location.origin);
  Object.entries(params).forEach(function(kv) { url.searchParams.set(kv[0], kv[1]); });
  const res = await fetch(url.toString());
  if (!res.ok) {
    var serverMessage = '';
    try {
      const body = await res.text();
      if (body) {
        try {
          const errorData = JSON.parse(body);
          if (typeof errorData.error === 'string') serverMessage = errorData.error;
          else if (typeof errorData.message === 'string') serverMessage = errorData.message;
        } catch (e) {
          serverMessage = body;
        }
      }
    } catch (e) {
      // Fall back to the HTTP status when the response body cannot be read.
    }

    serverMessage = serverMessage.replace(/([?&](?:token|api_?key)=)[^&\s]+/gi, '$1[redacted]').trim();
    if (serverMessage.length > 300) serverMessage = serverMessage.slice(0, 300) + '…';

    throw new Error('API error ' + res.status + (serverMessage ? ': ' + serverMessage : ''));
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function formatPrice(n) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}

function formatLargeNumber(n) {
  if (n == null || isNaN(n)) return '--';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'T';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'B';
  return '$' + n.toFixed(1) + 'M';
}

function formatPercent(n) {
  if (n == null || isNaN(n)) return '--';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function formatChange(d) {
  if (d == null || isNaN(d)) return '--';
  return (d >= 0 ? '+' : '') + d.toFixed(2);
}

function changeClass(n) {
  if (n == null || n === 0) return '';
  return n > 0 ? 'positive' : 'negative';
}

function arrowSvg(isPositive) {
  if (isPositive) {
    return '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 10V2M6 2L2 6M6 2l4 4"/></svg>';
  }
  return '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v8M6 10l-4-4M6 10l4-4"/></svg>';
}

function timeAgo(unixSec) {
  const now = Date.now() / 1000;
  const diff = now - unixSec;
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  const d = new Date(unixSec * 1000);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function weekAgoStr() {
  const d = new Date();
  d.setDate(d.getDate() - 7);
  return d.toISOString().split('T')[0];
}

async function fetchCandleData(symbol, resolution, from, to) {
  var data = await apiFetch('/stock/candle', { symbol: symbol, resolution: resolution, from: from, to: to });
  if (data.s !== 'ok') return null;
  return { c: data.c, t: data.t };
}

async function fetchAllGraphData(symbols, resolution, days, forceRefresh) {
  var to = Math.floor(Date.now() / 1000);
  var from = to - days * 86400;
  var results = {};
  var toFetch = [];

  for (var i = 0; i < symbols.length; i++) {
    var sym = symbols[i];
    var ck = sym + '_' + resolution + '_' + days;
    if (!forceRefresh && graphDataCache.hasOwnProperty(ck)) {
      results[sym] = graphDataCache[ck];
      continue;
    }
    toFetch.push(sym);
  }

  if (toFetch.length > 0) {
    var batchResults = await Promise.allSettled(
      toFetch.map(function(sym) { return fetchCandleData(sym, resolution, from, to); })
    );

    batchResults.forEach(function(res, j) {
      var sym = toFetch[j];
      var ck = sym + '_' + resolution + '_' + days;
      if (res.status === 'fulfilled' && res.value) {
        graphDataCache[ck] = res.value;
        results[sym] = res.value;
      } else {
        results[sym] = null;
        graphDataCache[ck] = null;
      }
    });
  }

  return results;
}

function isGraphDataCached(symbols, resolution, days) {
  for (var i = 0; i < symbols.length; i++) {
    var ck = symbols[i] + '_' + resolution + '_' + days;
    if (!graphDataCache.hasOwnProperty(ck) || graphDataCache[ck] === null) return false;
  }
  return true;
}

// =============================================
// Canvas Drawing
// =============================================
function getGraphColors() {
  var style = getComputedStyle(document.documentElement);
  return {
    bg: style.getPropertyValue('--surface').trim(),
    grid: style.getPropertyValue('--border-subtle').trim(),
    text: style.getPropertyValue('--text-muted').trim(),
    textFaint: style.getPropertyValue('--text-faint').trim(),
    accent: style.getPropertyValue('--accent').trim()
  };
}

function drawGraph(canvas, datasets, opts) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var width = canvas.clientWidth;
  var height = opts.height || 350;
  if (width === 0) return;

  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(dpr, dpr);

  var colors = getGraphColors();
  var pad = { top: 16, right: 16, bottom: 38, left: 55 };
  var pw = width - pad.left - pad.right;
  var ph = height - pad.top - pad.bottom;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, width, height);

  var allPoints = [];
  var maxIdx = 0;
  datasets.forEach(function(ds) {
    if (ds.visible && ds.data && ds.data.length > 0) {
      ds.data.forEach(function(pt, i) {
        if (pt != null && !isNaN(pt)) {
          allPoints.push(pt);
          if (i > maxIdx) maxIdx = i;
        }
      });
    }
  });

  if (allPoints.length === 0) {
    ctx.fillStyle = colors.text;
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No data available', width / 2, height / 2);
    return;
  }

  var effectiveMax = maxIdx === 0 ? 1 : maxIdx;

  var yMin = Math.min.apply(null, allPoints);
  var yMax = Math.max.apply(null, allPoints);
  var yRange = yMax - yMin || 1;
  var yPad = yRange * 0.1;
  var y0 = yMin - yPad;
  var y1 = yMax + yPad;

  function xPos(i) { return pad.left + (i / effectiveMax) * pw; }
  function yPos(v) { return pad.top + ph - ((v - y0) / (y1 - y0)) * ph; }

  // Grid - horizontal lines
  var yTicks = 6;
  ctx.strokeStyle = colors.grid;
  ctx.lineWidth = 0.5;
  for (var i = 0; i < yTicks; i++) {
    var y = pad.top + (i / (yTicks - 1)) * ph;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + pw, y);
    ctx.stroke();
  }

  // Grid - vertical lines
  var xTicks = Math.min(effectiveMax + 1, 8);
  var xStep = effectiveMax / Math.max(xTicks - 1, 1);
  for (var i = 0; i < xTicks; i++) {
    var idx = Math.round(i * xStep);
    var x = xPos(idx);
    ctx.beginPath();
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top + ph);
    ctx.stroke();
  }

  // Zero line for percent mode
  if (opts.percentMode && y0 <= 0 && y1 >= 0) {
    ctx.strokeStyle = colors.textFaint;
    ctx.lineWidth = 1;
    var zeroY = yPos(0);
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, zeroY);
    ctx.lineTo(pad.left + pw, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Y-axis labels
  ctx.fillStyle = colors.text;
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < yTicks; i++) {
    var val = y0 + i * yStep;
    var labelY = yPos(val);
    var label;
    if (opts.percentMode) {
      label = val.toFixed(1) + '%';
    } else {
      label = Math.abs(val) >= 1000 ? (val / 1000).toFixed(1) + 'k' : val.toFixed(1);
    }
    ctx.fillText(label, pad.left - 8, labelY);
  }

  // X-axis labels (dates)
  if (opts.labels && opts.labels.length > 0) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = colors.text;
    for (var i = 0; i < xTicks; i++) {
      var idx2 = Math.min(Math.round(i * xStep), opts.labels.length - 1);
      var lx = xPos(idx2);
      ctx.fillText(opts.labels[idx2] || '', lx, pad.top + ph + 7);
    }
  }

  // Data lines + dots
  datasets.forEach(function(ds) {
    if (!ds.visible || !ds.data || ds.data.length === 0) return;

    var validPoints = [];
    ds.data.forEach(function(v, i) {
      if (v != null && !isNaN(v)) {
        validPoints.push({ x: xPos(i), y: yPos(v), v: v });
      }
    });
    if (validPoints.length === 0) return;

    ctx.strokeStyle = ds.color;
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    validPoints.forEach(function(pt, i) {
      if (i === 0) ctx.moveTo(pt.x, pt.y);
      else ctx.lineTo(pt.x, pt.y);
    });
    ctx.stroke();

    ctx.fillStyle = ds.color;
    validPoints.forEach(function(pt) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

// =============================================
// Legend Rendering
// =============================================
function renderLegend(containerId, items, visibilityMap, onChange) {
  var container = document.getElementById(containerId);
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var isHidden = visibilityMap[item.key] === false;
    html += '<span class="legend-item' + (isHidden ? ' hidden' : '') + '" data-key="' + item.key + '">' +
      '<span class="legend-dot" style="background:' + item.color + ';"></span>' + item.label + '</span>';
  }
  container.innerHTML = html;

  container.querySelectorAll('.legend-item').forEach(function(el) {
    el.addEventListener('click', function() {
      var key = el.dataset.key;
      visibilityMap[key] = visibilityMap[key] === false;
      onChange();
    });
  });
}

// =============================================
// Time Range Buttons
// =============================================
function renderTimeRangeButtons(containerId, activeRange, onChange) {
  var container = document.getElementById(containerId);
  var html = '<div class="time-range-btns">';
  for (var i = 0; i < TIME_RANGES.length; i++) {
    var tr = TIME_RANGES[i];
    html += '<button class="time-range-btn' + (tr.label === activeRange ? ' active' : '') +
      '" data-range="' + tr.label + '">' + tr.label + '</button>';
  }
  html += '</div>';
  container.innerHTML = html;

  container.querySelectorAll('.time-range-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      onChange(btn.dataset.range);
    });
  });
}

// =============================================
// Graph Build & Update
// =============================================
function getTimeRange(days) {
  for (var i = 0; i < TIME_RANGES.length; i++) {
    if (TIME_RANGES[i].label === days) return TIME_RANGES[i];
  }
  return TIME_RANGES[0];
}

function formatDateLabel(ts, resolution) {
  var d = new Date(ts * 1000);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function refreshStockGraph(forceRefresh) {
  var tr = getTimeRange(activeStockTimeRange);
  var symbols = STOCKS.map(function(s) { return s.symbol; });
  var loadingEl = document.getElementById('stocksGraphLoading');
  var canvas = document.getElementById('stocksCanvas');

  var cached = isGraphDataCached(symbols, tr.resolution, tr.days);
  if (!forceRefresh && cached) {
    loadingEl.style.display = 'none';
    canvas.style.display = 'block';
  } else {
    loadingEl.style.display = 'flex';
    canvas.style.display = 'none';
  }

  var data = await fetchAllGraphData(symbols, tr.resolution, tr.days, forceRefresh);

  loadingEl.style.display = 'none';
  canvas.style.display = 'block';

  var datasets = [];
  var allTimestamps = [];

  STOCKS.forEach(function(stock, i) {
    var raw = data[stock.symbol];
    if (!raw || !raw.c || raw.c.length === 0) return;
    var firstClose = raw.c[0];
    if (!firstClose) return;
    var pctData = raw.c.map(function(c) { return c != null ? ((c / firstClose) - 1) * 100 : null; });
    datasets.push({
      key: stock.symbol,
      label: stock.symbol,
      color: STOCK_COLORS[i % STOCK_COLORS.length],
      data: pctData,
      visible: visibleStocks[stock.symbol] !== false
    });
    if (raw.t.length > allTimestamps.length) allTimestamps = raw.t;
  });

  var labels = allTimestamps.map(function(ts) { return formatDateLabel(ts, tr.resolution); });
  drawGraph(canvas, datasets, { labels: labels, percentMode: true, height: 350 });

  renderLegend('stocksLegend',
    datasets.map(function(ds) { return { key: ds.key, label: ds.label, color: ds.color }; }),
    visibleStocks,
    function() { refreshStockGraph(false); }
  );

  renderTimeRangeButtons('stocksTimeRange', activeStockTimeRange, function(range) {
    activeStockTimeRange = range;
    refreshStockGraph(false);
  });
}

}

function redrawGraphsIfVisible() {
  if (!document.getElementById('graphsContent').hasAttribute('hidden')) {
    refreshAllGraphs(false).catch(console.error);
  }
}

// =============================================
// Tab Switching
// =============================================
(function initTabs() {
  var tabBar = document.getElementById('tabBar');
  var dashboardContent = document.getElementById('dashboardContent');
  var graphsContent = document.getElementById('graphsContent');
  var graphsLoaded = false;

  tabBar.addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    var tabName = tab.dataset.tab;

    tabBar.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');

    if (tabName === 'dashboard') {
      dashboardContent.removeAttribute('hidden');
      graphsContent.setAttribute('hidden', '');
    } else {
      dashboardContent.setAttribute('hidden', '');
      graphsContent.removeAttribute('hidden');
      if (!graphsLoaded) {
        graphsLoaded = true;
        refreshAllGraphs(false);
      }
    }
  });
})();

// =============================================
// Canvas Resize Handler
// =============================================
var resizeTimeout;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(function() {
    redrawGraphsIfVisible();
  }, 250);
});

// =============================================
// Initialize
// =============================================
refreshAll();
